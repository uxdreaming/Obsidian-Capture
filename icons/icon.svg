  <!-- Text lines -->
  <rect x="48" y="54" width="32" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  <rect x="48" y="64" width="28" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  <rect x="48" y="74" width="24" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  <!-- Yellow highlight bar -->
