<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Web Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">Obsidian Clipper</h1>
    </header>

    <!-- Setup view (first time) -->
    <div id="setupView" class="view" style="display: none;">
      <p class="setup-text">Select your Obsidian vault folder to start clipping.</p>
      <button class="btn-primary" id="selectVaultBtn">
        Select Vault Folder
      </button>
    </div>

    <!-- Main view (after setup) -->
    <div id="mainView" class="view" style="display: none;">
      <div class="actions">
        <button class="btn-primary" id="captureBtn">
          Capture
        </button>

        <button class="btn-secondary" id="editBtn">
          Edit selection
        </button>
      </div>

      <p class="hint" id="pageType"></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
