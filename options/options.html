<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Web Clipper - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Obsidian Web Clipper</h1>
    </header>

    <main>
      <section class="settings-section">
        <h2>Vault</h2>

        <div class="setting-item">
          <button type="button" id="resetVault" class="btn btn-secondary">Change Vault Folder</button>
          <p class="help-text">
            Select a different Obsidian vault folder.
          </p>
        </div>
      </section>

      <section class="settings-section">
        <h2>AI Summary (YouTube)</h2>

        <div class="setting-item">
          <label for="groqApiKey">Groq API Key</label>
          <input type="password" id="groqApiKey" placeholder="gsk_..." autocomplete="off" />
          <button type="button" id="saveGroqKey" class="btn btn-primary">Save</button>
          <p class="help-text">
            Used to generate AI summaries when capturing YouTube videos.
            Get a free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a>.
          </p>
          <p id="groqStatus" class="help-text" style="display:none"></p>
        </div>
      </section>
    </main>

  </div>

  <script src="options.js"></script>
</body>
</html>
